services:
  - type: web
    name: talentbridge-frontend
    runtime: static
    buildCommand: npm install --legacy-peer-deps && npm run build --configuration=production
    staticPublishPath: dist/talentbridge-frontend/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
